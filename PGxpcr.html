<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCR & qPCR Interactive Lab - Dr. Faridi</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f8; color: #2c3e50; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); max-width: 900px; width: 100%; }
        h1 { text-align: center; margin-bottom: 5px; color: #1a2a3a; }
        .author { text-align: center; color: #5d6d7e; font-size: 1.1rem; margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        
        /* Simulation Box */
        .cycler-box { height: 160px; border: 3px solid #34495e; border-radius: 12px; display: flex; flex-wrap: wrap; justify-content: center; align-content: center; background: #ecf0f1; margin-bottom: 20px; transition: 0.4s; overflow: hidden; padding: 10px; }
        .dna-strand { height: 6px; width: 40px; background: linear-gradient(90deg, #3498db, #9b59b6); margin: 2px; border-radius: 3px; }

        /* Chart Controls */
        .config-panel { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: flex; align-items: center; gap: 20px; border: 1px solid #dee2e6; }
        .slider-group { flex-grow: 1; }
        input[type=range] { width: 100%; cursor: pointer; }

        .chart-wrapper { position: relative; height: 180px; border-bottom: 2px solid #333; border-left: 2px solid #333; margin: 30px 0; display: flex; align-items: flex-end; }
        #chart-container { display: flex; align-items: flex-end; gap: 5px; width: 100%; height: 100%; padding: 0 5px; }
        .bar { background: #e67e22; width: 30px; border-radius: 3px 3px 0 0; transition: height 0.3s; position: relative; }
        .threshold-line { position: absolute; left: 0; width: 100%; border-top: 2px dashed #e74c3c; top: 50%; z-index: 5; }
        .threshold-label { position: absolute; right: 0; top: 50%; transform: translateY(-120%); color: #e74c3c; font-size: 0.75rem; font-weight: bold; background: white; padding: 2px; }

        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-card { background: #fff; padding: 15px; border-radius: 8px; border: 1px solid #eee; border-left: 5px solid #3498db; box-shadow: 2px 2px 5px rgba(0,0,0,0.02); }
        .ct-found { border-left-color: #e74c3c !important; background: #fff5f5; }
        
        .controls { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        button { padding: 12px 28px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; }
        .btn-next { background: #27ae60; color: white; }
        .btn-next:disabled { background: #bdc3c7; cursor: not-allowed; }
        .btn-reset { background: #95a5a6; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1>PCR & Real-Time PCR Simulator</h1>
    <div class="author">Hafeez Faridi Ph.D.</div>

    <div class="config-panel">
        <div class="slider-group">
            <label><strong>Initial DNA Concentration:</strong> <span id="initial-val">1</span> copy</label>
            <input type="range" id="dna-slider" min="1" max="10" value="1" oninput="updateInitial(this.value)">
        </div>
        <div>
            <strong>Mode:</strong> Quantitative PCR
        </div>
    </div>
    
    <div id="cycler" class="cycler-box">
        <div id="dna-container"></div>
    </div>

    <div class="chart-wrapper">
        <div class="threshold-line"></div>
        <div class="threshold-label">Detection Threshold</div>
        <div id="chart-container"></div>
    </div>

    <div class="stats">
        <div class="stat-card">
            <strong>Cycle:</strong> <span id="cycle-count">0</span> | <strong>Temp:</strong> <span id="temp-display">25</span>°C<br>
            <small id="step-desc">Select initial concentration and press "Start Cycle"</small>
        </div>
        <div class="stat-card" id="ct-card">
            <strong>Fluorescence:</strong> <span id="fluor-display">0</span><br>
            <strong>Ct Value:</strong> <span id="ct-display">--</span>
        </div>
    </div>

    <div class="controls">
        <button class="btn-next" id="next-btn" onclick="nextStep()">Start Next Step</button>
        <button class="btn-reset" onclick="resetSim()">Reset</button>
    </div>
</div>

<script>
    let step = 0, cycle = 0, dnaCopies = 1, initialDna = 1, ctFound = false;
    const threshold = 25; // Units to cross threshold
    
    const steps = [
        { name: "Denaturation", temp: 95, color: "#fadbd8", desc: "Heating to 95°C to separate strands." },
        { name: "Annealing", temp: 55, color: "#d6eaf8", desc: "Cooling to 55°C for primer binding." },
        { name: "Extension", temp: 72, color: "#d5f5e3", desc: "Extending new strands at 72°C." }
    ];

    function updateInitial(val) {
        if(cycle === 0) {
            initialDna = parseInt(val);
            dnaCopies = initialDna;
            document.getElementById('initial-val').innerText = val;
            renderDNAVisuals();
        }
    }

    function renderDNAVisuals() {
        const container = document.getElementById('dna-container');
        container.innerHTML = '';
        const displayCount = Math.min(dnaCopies, 60); 
        for(let i=0; i<displayCount; i++) {
            const d = document.createElement('div');
            d.className = 'dna-strand';
            container.appendChild(d);
        }
    }

    function nextStep() {
        document.getElementById('dna-slider').disabled = true;
        const currentStep = steps[step];
        document.getElementById('cycler').style.backgroundColor = currentStep.color;
        document.getElementById('temp-display').innerText = currentStep.temp;
        document.getElementById('step-desc').innerText = currentStep.desc;

        if (step === 2) {
            dnaCopies *= 2;
            cycle++;
            updateqPCR();
        }
        step = (step + 1) % 3;
    }

    function updateqPCR() {
        document.getElementById('cycle-count').innerText = cycle;
        let fluor = (dnaCopies * 0.8).toFixed(1);
        document.getElementById('fluor-display').innerText = fluor;
        
        if (!ctFound && fluor >= threshold) {
            ctFound = true;
            document.getElementById('ct-display').innerText = cycle;
            document.getElementById('ct-card').classList.add('ct-found');
        }

        const bar = document.createElement('div');
        bar.className = 'bar';
        bar.style.height = Math.min(fluor * 2, 100) + '%';
        bar.innerHTML = `<span style="font-size:8px; position:absolute; top:-15px;">C${cycle}</span>`;
        document.getElementById('chart-container').appendChild(bar);
        renderDNAVisuals();

        if (cycle >= 15) document.getElementById('next-btn').disabled = true;
    }

    function resetSim() {
        step = 0; cycle = 0; dnaCopies = initialDna; ctFound = false;
        document.getElementById('dna-slider').disabled = false;
        document.getElementById('next-btn').disabled = false;
        document.getElementById('chart-container').innerHTML = '';
        document.getElementById('cycle-count').innerText = '0';
        document.getElementById('temp-display').innerText = '25';
        document.getElementById('fluor-display').innerText = '0';
        document.getElementById('ct-display').innerText = '--';
        document.getElementById('ct-card').classList.remove('ct-found');
        document.getElementById('step-desc').innerText = 'Ready to begin.';
        document.getElementById('cycler').style.backgroundColor = '#ecf0f1';
        renderDNAVisuals();
    }
    
    renderDNAVisuals(); // Init
</script>
</body>
</html>
